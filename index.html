<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>

        <p>Portfolio UI</p>
      </div>

  <section class="section" id="contact">

    <button class="btn" onclick="contactMe()">Contact</button>
  </section>

  <script src="script.js"></script>

</html>
